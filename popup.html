<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>快捷网址导航</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 280px;
        padding: 12px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #fff;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 14px;
        font-weight: 600;
        color: #1d2129;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #e5e6eb;
      }

      .header-btn {
        font-size: 12px;
        color: #165dff;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 4px;
        transition: background-color 0.2s;
      }

      .header-btn:hover {
        background-color: #e8f3ff;
      }

      .site-list {
        list-style: none;
      }

      .site-item {
        display: flex;
        align-items: center;
        padding: 10px 12px;
        margin: 4px 0;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      .site-item:hover {
        background-color: #f2f3f5;
      }

      .site-icon {
        width: 24px;
        height: 24px;
        margin-right: 10px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }

      .site-name {
        font-size: 14px;
        color: #1d2129;
        flex: 1;
        cursor: pointer;
      }

      .site-arrow {
        color: #c9cdd4;
        font-size: 12px;
      }

      .delete-btn {
        background: none;
        border: none;
        color: #c9cdd4;
        font-size: 16px;
        cursor: pointer;
        padding: 0 4px;
        margin-left: 4px;
        opacity: 0;
        transition: opacity 0.2s, color 0.2s;
      }

      .site-item:hover .delete-btn {
        opacity: 1;
      }

      .delete-btn:hover {
        color: #f53f3f;
      }

      .add-section {
        display: none;
      }

      .form-group {
        margin-bottom: 12px;
      }

      .form-label {
        display: block;
        font-size: 13px;
        color: #4e5969;
        margin-bottom: 4px;
      }

      .form-input {
        width: 100%;
        height: 32px;
        padding: 0 8px;
        font-size: 13px;
        border: 1px solid #c9cdd4;
        border-radius: 4px;
        outline: none;
        transition: border-color 0.2s;
      }

      .form-input:focus {
        border-color: #165dff;
      }

      .form-row {
        display: flex;
        gap: 8px;
      }

      .form-row .form-group {
        flex: 1;
      }

      .color-input {
        width: 100%;
        height: 32px;
        padding: 2px;
        border: 1px solid #c9cdd4;
        border-radius: 4px;
        cursor: pointer;
      }

      .submit-btn {
        width: 100%;
        height: 32px;
        background: #165dff;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      .submit-btn:hover {
        background: #0e4dd9;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span>快速打开</span>
      <span id="addBtn" class="header-btn">+ 新增</span>
      <span id="backBtn" class="header-btn" style="display: none">返回</span>
    </div>

    <div id="listSection">
      <ul class="site-list" id="siteList"></ul>
    </div>

    <div id="addSection" class="add-section">
      <div class="form-group">
        <label class="form-label">网站名称</label>
        <input type="text" id="siteName" class="form-input" placeholder="如：豆包" />
      </div>
      <div class="form-group">
        <label class="form-label">网站地址</label>
        <input type="text" id="siteUrl" class="form-input" placeholder="如：https://www.doubao.com" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">图标 (emoji)</label>
          <input type="text" id="siteIcon" class="form-input" placeholder="如：🫘" />
        </div>
        <div class="form-group">
          <label class="form-label">背景色</label>
          <input type="color" id="siteColor" class="color-input" value="#e8f3ff" />
        </div>
      </div>
      <button id="submitBtn" class="submit-btn">添加</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
