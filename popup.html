<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快捷网址导航</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
    }

    .header {
      font-size: 14px;
      font-weight: 600;
      color: #1d2129;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e5e6eb;
    }

    .site-list {
      list-style: none;
    }

    .site-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      margin: 4px 0;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .site-item:hover {
      background-color: #f2f3f5;
    }

    .site-icon {
      width: 24px;
      height: 24px;
      margin-right: 10px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .site-name {
      font-size: 14px;
      color: #1d2129;
      flex: 1;
    }

    .site-arrow {
      color: #c9cdd4;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">快捷导航</div>
  <ul class="site-list" id="siteList"></ul>

  <script src="popup.js"></script>
</body>
</html>
